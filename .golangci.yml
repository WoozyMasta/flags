version: "2"
run:
  tests: false
linters:
  enable:
    - modernize
    - prealloc
    - tagliatelle
    - perfsprint
    - asciicheck
    - bidichk
    - decorder
    - dupl
    - gocritic
    - bodyclose
    - gosec
    - nilerr
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - tparallel
    - unconvert
    - unparam
    - whitespace
    - staticcheck
    - goheader
  exclusions:
    generated: lax
    presets:
      - common-false-positives
    paths:
      - third_party$
      - builtin$
      - examples$
  settings:
    goheader:
      template: |-
        Copyright 2012 Jesse van den Kieboom. All rights reserved.
        Use of this source code is governed by a BSD-style
        license that can be found in the LICENSE file.
    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
